<!DOCTYPE html>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* FONDO DINÁMICO (VIBE VICE CITY) */
        .bg-video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255, 0, 212, 0.1) 0%, rgba(0, 204, 255, 0.1) 100%);
            z-index: -1;
        }

        /* TARJETA DE DESCARGA */
        .download-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 95%;
            max-width: 500px;
            padding: 50px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.1);
        }

        /* LOGO ROCKSTAR */
        .rockstar-logo {
            width: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        /* TEXTOS */
        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 5px;
            color: #FFD700; /* Dorado Rockstar */
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 64px;
            line-height: 0.9;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff 40%, #ccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version-tag {
            background: linear-gradient(90deg, #ff00d4, #00ccff);
            padding: 5px 15px;
            font-size: 12px;
            font-weight: 900;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* BOTÓN DE DESCARGA */
        .btn-download {
            display: block;
            background: #FFD700;
            color: #000;
            text-decoration: none;
            padding: 20px;
            font-weight: 900;
            font-size: 18px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        .btn-download:hover {
            transform: scale(1.05);
            background: #fff;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.3);
        }

        .btn-download:active {
            transform: scale(0.95);
        }

        /* DECORACIÓN */
        .footer-info {
            margin-top: 30px;
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-video-overlay"></div>

    <div class="download-card">

        <svg class="rockstar-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

        <div class="brand-name">Rockstar Games Presents</div>
        <h1>GRAND THEFT AUTO VI</h1>

        </div>

</body>
</html>
